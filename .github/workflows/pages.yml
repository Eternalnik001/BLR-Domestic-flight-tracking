name: deploy-frontend

# Publishes the static web/ folder to GitHub Pages.
# One-time: repo Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths: ["web/**"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-progress deploy; let the latest queue behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
